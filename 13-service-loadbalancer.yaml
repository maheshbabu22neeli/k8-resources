apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
    # selecting labels(04-labels) pod to this service
    project: roboshop
    environment: dev
    component: frontend
  ports:
    - protocol: TCP
      port: 80          # service port
      targetPort: 80    # container port
