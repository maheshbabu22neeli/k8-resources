apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: roboshop
  labels:
    project: rosboshop
    tier: frontend
    component: frontend
    purpose: replica-set-demo

spec:
  replicas: 3
  selector:
    # This match labels will go and find the pods who contain these labels
    matchLabels:
      project: rosboshop
      tier: frontend
      component: frontend

  # This is a POD definition/template (pod is a subset of replica-set)
  template:
    metadata:
      # POD Labels, these labels will refer in replica-set selector
      labels:
        project: rosboshop
        tier: frontend
        component: frontend
    spec:
      containers:
        - name: nginx
          #image: nginx
          # Updating to a new image or new ver
          image: nginx:alpine3.23
